services:
  postgres:
    image: postgres:alpine
    container_name: shorten-postgres
    restart: always
    environment:
      POSTGRES_USER: ss1ngh
      POSTGRES_PASSWORD: shorten
      POSTGRES_DB: ss1ngh
    ports:
      - "5432:5432"
    volumes:
      - shorten-db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: shorten-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .         
      dockerfile: server/Dockerfile
    container_name: shorten-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://ss1ngh:shorten@postgres:5432/ss1ngh?schema=public
    depends_on:
      - redis
      - postgres

volumes:
  shorten-db-data: